name: Water Tracker
options:
  deploymentTarget:
    iOS: "16.0"
targets:
  iosApp:
    type: application
    platform: iOS
    sources: [iosApp]
    settings:
      base:
        INFOPLIST_FILE: iosApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.dailywater.app
    dependencies:
      - framework: composeApp/build/bin/iosArm64/releaseFramework/ComposeApp.framework
        embed: true
